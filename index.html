<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --primary: #221F25;
            --secondary: #332F38;
            --text: #DCDCDC;
            --text-dim: #8A8A8A;
            --accent-1: #6A6FEC;
            --accent-2: #A06AEC;
            --success: #4ADE80;
            --warning: #FBBF24;
            --danger: #F87171;
            --card-shadow: 0 8px 32px rgba(0,0,0,0.4);
            --card-radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        .presentation { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .slide-viewport { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background: var(--bg); }
        .slide { width: 1280px; height: 720px; background: var(--primary); border-radius: 4px; overflow: hidden; display: none; position: relative; }
        .slide.active { display: block; }
        .slide::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); z-index: 10; }
        .controls { background: var(--primary); border-top: 1px solid var(--secondary); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color: #fff; border: none; padding: 10px 28px; border-radius: 8px; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; transition: all 0.2s; box-shadow: 0 4px 16px rgba(106,111,236,0.3); }
        .nav-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(106,111,236,0.5); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
        .slide-info { text-align: center; }
        .slide-counter { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
        .slide-title-bar { font-size: 14px; font-weight: 600; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .s-title { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px 80px; background: var(--bg); position: relative; overflow: hidden; }
        .s-title .bg-glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(106,111,236,0.15) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .s-title h1 { font-size: 56px; font-weight: 800; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 20px; position: relative; }
        .accent-text, .text-accent { background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .s-title .subtitle { font-size: 22px; font-weight: 400; color: var(--text-dim); max-width: 700px; line-height: 1.7; position: relative; }
        .s-title .logo-text { font-size: 14px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 32px; position: relative; }
        .s-content { padding: 36px 52px 26px; display: flex; flex-direction: column; }
        .s-content .slide-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--secondary); }
        .s-content .slide-header h2 { font-size: 38px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; }
        .s-content .slide-header .tagline { font-size: 15px; font-weight: 400; color: var(--accent-1); margin-top: 6px; }
        .card { background: var(--secondary); border-radius: var(--card-radius); padding: 18px 22px; box-shadow: var(--card-shadow); border: 1px solid rgba(255,255,255,0.04); }
        .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .card-value { font-size: 40px; font-weight: 800; color: #fff; line-height: 1.1; }
        .card-sub { font-size: 13px; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }
        .tbl { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; border-radius: var(--card-radius); overflow: hidden; }
        .tbl th { background: var(--secondary); padding: 12px 16px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent-1); border-bottom: 1px solid rgba(255,255,255,0.06); }
        .tbl td { padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text); font-weight: 400; vertical-align: top; }
        .tbl tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
        .tbl tr:last-child td { border-bottom: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        .flex-fill { flex: 1; min-height: 0; }
        .bullet-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; font-size: 16px; line-height: 1.55; }
        .bullet-dot { width: 9px; height: 9px; min-width: 9px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); margin-top: 7px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-green { background: rgba(74,222,128,0.15); color: var(--success); }
        .badge-yellow { background: rgba(251,191,36,0.15); color: var(--warning); }
        .badge-red { background: rgba(248,113,113,0.15); color: var(--danger); }
        .step-num { width: 30px; height: 30px; min-width: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
        .callout { background: var(--secondary); border-left: 3px solid var(--accent-1); border-radius: 0 var(--card-radius) var(--card-radius) 0; padding: 15px 20px; font-size: 15px; line-height: 1.6; color: var(--text); }
        .s-closing { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px 80px; background: var(--bg); position: relative; overflow: hidden; }
        .s-closing .bg-glow-1 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(106,111,236,0.12) 0%, transparent 70%); top: 20%; left: 20%; pointer-events: none; }
        .s-closing .bg-glow-2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(160,106,236,0.1) 0%, transparent 70%); bottom: 10%; right: 15%; pointer-events: none; }
        strong { font-weight: 600; color: #fff; }
        .text-dim { color: var(--text-dim); }
    </style>
</head>

<script>
const S=[
{title:'Welcome',html:`<div class="s-title" style="width:1280px;height:720px;"><div class="bg-glow"></div><div class="logo-text">Video Editor Studio</div><h1>Day 1: 2025 Review &<br><span class="accent-text">2026 Direction</span></h1><div class="subtitle" style="margin-top:20px;">We're here to review 2025, be honest about what worked and what didn't, and align on the plan to take VES from $200K to $1M.<br><strong style="-webkit-text-fill-color:var(--text);">Clarity. Focus. Execution.</strong></div></div>`},
{title:'2025 Review — The Numbers',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>2025 Review</h2><div class="tagline">The Numbers</div></div><div class="flex-fill" style="overflow:hidden;"><table class="tbl" style="margin-bottom:20px;"><tr><th>Metric</th><th>Goal</th><th>Result</th><th>Status</th></tr><tr><td>Revenue</td><td>$130K (stretch: $150K)</td><td style="color:#fff;font-weight:700;">$199K</td><td><span class="badge badge-green">✅ Crushed it (+53%)</span></td></tr><tr><td>Mailing List</td><td>100K</td><td style="color:#fff;font-weight:700;">150K</td><td><span class="badge badge-green">✅ Crushed it</span></td></tr><tr><td>Packs Shipped</td><td>12</td><td>8 (2 at $100+, 6 at $50+)</td><td><span class="badge badge-yellow">⚠️ Fell short</span></td></tr><tr><td>YouTube Growth</td><td>50K subs, weekly uploads</td><td>Minimal uploads</td><td><span class="badge badge-red">❌ Missed</span></td></tr><tr><td>SOPs</td><td>Better procedures</td><td>Not completed</td><td><span class="badge badge-red">❌ Missed</span></td></tr></table><div class="callout"><strong>The Honest Truth —</strong> $199K is a massive win. But we achieved this with <strong>minimal effort</strong> compared to what we're capable of. The revenue came from product quality and our existing audience alone. Now imagine what happens when we actually execute on everything.</div></div></div>`},
{title:'Where We Won',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Where We Won in 2025</h2><div class="tagline">What worked and why</div></div><div class="grid-2 flex-fill"><div class="card"><div class="card-label">Product Quality</div><div style="font-size:15px;line-height:1.65;">The Personal Brand Pack, History Pack and Data Pro Pack are our best work yet. Art direction with Sarah + Vishal's functionality work paid off. Need to improve on <strong>reliability</strong> and <strong>design diversity</strong>.</div></div><div class="card"><div class="card-label">Bundle Strategy Works</div><div style="font-size:15px;line-height:1.65;">Top 5 products are almost all bundles. <strong>Video Editor Pro Bundle drove ~20%</strong> of annual revenue. Top 5 combined = <strong>50% of total revenue</strong>.</div></div><div class="card"><div class="card-label">Market of One</div><div style="font-size:15px;line-height:1.65;">Products like the Map Pack put us where <strong>no competitor can follow</strong>. We make things that don't exist anywhere else for DaVinci Resolve.</div></div><div class="card"><div class="card-label">Price Tolerance</div><div style="font-size:15px;line-height:1.65;">Customers pay premium for quality. The data confirms we should <strong>go higher, not lower</strong>.</div></div></div></div>`},
{title:'Where We Fell Short',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Where We Fell Short</h2><div class="tagline">Honest assessment</div></div><div class="flex-fill" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><div class="card" style="border-left:3px solid var(--danger);"><div style="font-weight:700;color:#fff;margin-bottom:8px;font-size:15px;">Content</div><div style="font-size:13px;line-height:1.6;">YouTube is our core traffic driver and we barely posted. Single biggest missed opportunity. Now that I'm full time on VES, I will re-commit to it.</div></div><div class="card" style="border-left:3px solid var(--danger);"><div style="font-weight:700;color:#fff;margin-bottom:8px;font-size:15px;">Paid Traffic</div><div style="font-size:13px;line-height:1.6;">Zero ads. Zero experimentation. An entire growth lever left completely untouched.</div></div><div class="card" style="border-left:3px solid var(--warning);"><div style="font-weight:700;color:#fff;margin-bottom:8px;font-size:15px;">Production Speed</div><div style="font-size:13px;line-height:1.6;">Packs take too long to finalise. We were far behind our publication schedule all year.</div></div><div class="card" style="border-left:3px solid var(--warning);"><div style="font-weight:700;color:#fff;margin-bottom:8px;font-size:15px;">Over-Engineered Systems</div><div style="font-size:13px;line-height:1.6;">Notion became too complex. More time managing than using. Small team = need agility, not bureaucracy.</div></div></div></div>`},
{title:'Top Products',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Top Products — What the Data Tells Us</h2><div class="tagline">50% of revenue comes from just 5 products</div></div><div class="flex-fill" style="overflow:hidden;"><table class="tbl"><tr><th>Insight</th><th>Takeaway</th></tr><tr><td>Top 5 products are almost all bundles</td><td><strong>Build every pack with the final bundle in mind</strong></td></tr><tr><td>Pro Bundle drove ~20% of annual revenue</td><td><strong>Value ladder works</strong> — push customers toward bundles</td></tr><tr><td>Map Pack sells standalone AND drives bundle sales</td><td><strong>Map Pack V2 at $149-$199</strong> = #1 product priority</td></tr><tr><td>Explainer Bundle is #2, driven by Map Pack</td><td>The <strong>VOX / John Harris</strong> explainer style resonates</td></tr><tr><td>Cinematic content underperforms</td><td>Deprioritise cinematic, lean into <strong>branded toolkits</strong></td></tr></table></div></div>`},
{title:'The 2026 Opportunity',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>The 2026 Opportunity</h2><div class="tagline">$500K base → $1M stretch. We're going for $1M.</div></div><div class="grid-3" style="margin-bottom:24px;"><div class="card" style="text-align:center;"><div class="card-label">Current State</div><div class="card-value">$200K</div><div class="card-sub">2,000 sales × $100 AOV</div></div><div class="card" style="text-align:center;display:flex;align-items:center;justify-content:center;"><div style="font-size:48px;font-weight:800;" class="text-accent">→</div></div><div class="card" style="text-align:center;background:linear-gradient(135deg,rgba(106,111,236,0.15),rgba(160,106,236,0.15));border:1px solid rgba(106,111,236,0.3);"><div class="card-label">Target State</div><div class="card-value">$1M</div><div class="card-sub">5,000 sales × $200 AOV</div></div></div><div class="callout" style="margin-bottom:16px;"><strong>Team Bonuses</strong> — Everyone gets <strong>1% bonus on profits</strong>. $500K profit = $5K bonus. $1M profit = $10K bonus. You could receive about a year's salary as a bonus.</div><div style="font-size:13px;color:var(--text-dim);line-height:1.6;">Tough times ahead — war, market instability, AI disruption. We need to stock up cash now. Lock in for 2-3 years.</div></div>`},
{title:'Four Growth Levers',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>The Four Growth Levers</h2><div class="tagline">Every action in 2026 pulls one of these levers</div></div><div class="grid-2 flex-fill"><div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><span class="step-num">1</span><div style="font-weight:700;font-size:16px;color:#fff;">Increase Product Catalogue</div></div><div style="font-size:13px;line-height:1.6;">13 new packs — 8 at $100+, 5 at $50+. Abandon under $50. Free assets for beginners. Serve All-Access Pass holders. <span class="text-accent" style="font-size:13px;">PRIORITY #1</span></div></div><div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><span class="step-num">2</span><div style="font-weight:700;font-size:16px;color:#fff;">Increase Price & AOV → $200</div></div><div style="font-size:13px;line-height:1.6;">Packs $59-99 → Bundles $149-249 → Pro $499-999 → Lifetime $1,999. Better upsells, cross-sells, in-cart incentives.</div></div><div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><span class="step-num">3</span><div style="font-weight:700;font-size:16px;color:#fff;">Increase Traffic</div></div><div style="font-size:13px;line-height:1.6;">Content flywheel: product → content → traffic → email → sales. 150+ YouTube videos. Paid ads. Switch to Klaviyo.</div></div><div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><span class="step-num">4</span><div style="font-weight:700;font-size:16px;color:#fff;">Increase Conversion Rates</div></div><div style="font-size:13px;line-height:1.6;">Track everything. Identify choke points. Optimise website before paid traffic. Split test on YouTube.</div></div></div></div>`},
{title:'The Value Ladder',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>The Value Ladder — $200 AOV</h2><div class="tagline">Guide customers up a clear spending path</div></div><div class="grid-4 flex-fill" style="align-items:stretch;margin-bottom:16px;"><div class="card" style="display:flex;flex-direction:column;"><div class="card-label">Low Anchor</div><div style="font-size:28px;font-weight:800;color:#fff;margin-bottom:4px;">$59–99</div><div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">Individual Packs</div><div style="font-size:11px;line-height:1.5;">Entry point. Baseline value.</div></div><div class="card" style="display:flex;flex-direction:column;background:linear-gradient(180deg,var(--secondary),rgba(106,111,236,0.08));"><div class="card-label">Core Offer</div><div style="font-size:28px;font-weight:800;color:#fff;margin-bottom:4px;">$149–249</div><div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">Bundles</div><div style="font-size:11px;line-height:1.5;">Where most revenue comes from. 8 themed bundles.</div></div><div class="card" style="display:flex;flex-direction:column;background:linear-gradient(180deg,var(--secondary),rgba(106,111,236,0.12));"><div class="card-label">High Anchor</div><div style="font-size:28px;font-weight:800;color:#fff;margin-bottom:4px;">$499–999</div><div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">Pro Bundles</div><div style="font-size:11px;line-height:1.5;">Makes core bundles look affordable.</div></div><div class="card" style="display:flex;flex-direction:column;background:linear-gradient(135deg,rgba(106,111,236,0.15),rgba(160,106,236,0.15));border:1px solid rgba(106,111,236,0.3);"><div class="card-label">Absurd Anchor</div><div style="font-size:28px;font-weight:800;color:#fff;margin-bottom:4px;">$1,999</div><div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">Lifetime Pass</div><div style="font-size:11px;line-height:1.5;">Everything forever. Reframes pricing.</div></div></div><table class="tbl" style="font-size:12px;"><tr><th>Touchpoint</th><th>Upsell Action</th></tr><tr><td>Pack page</td><td>Pop-up → corresponding bundle</td></tr><tr><td>Bundle page</td><td>Promote Video Editor Pro Bundle</td></tr><tr><td>Cart ($149+)</td><td>10% discount + smart recs</td></tr><tr><td>Post-purchase (pack)</td><td>Upgrade to full bundle</td></tr><tr><td>Post-purchase (bundle)</td><td>Another bundle at 50% off</td></tr></table></div>`},
{title:'2026 Product Roadmap',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>2026 Product Roadmap — 13 Packs</h2><div class="tagline">8 packs at $100+ · 5 packs at $50+</div></div><div class="grid-2 flex-fill"><div><div class="card-label" style="margin-bottom:12px;">Packs at $100+</div><table class="tbl" style="font-size:12px;"><tr><th>Pack</th><th>Price</th><th>Bundle</th></tr><tr><td><strong>Map Pack V2</strong></td><td>$149–199</td><td>Explainer <span class="badge badge-green" style="font-size:9px;padding:1px 6px;">TOP</span></td></tr><tr><td>Journalist Pack</td><td>$99</td><td>Narrative</td></tr><tr><td>Start-Up Pack</td><td>$99</td><td>Narrative</td></tr><tr><td>Presentation Pack</td><td>$99</td><td>Explainer</td></tr><tr><td>Online Creator Pro</td><td>$99</td><td>Online Creator</td></tr><tr><td>Documentary Pack</td><td>$99</td><td>Cinematic</td></tr><tr><td>Editor Toolkit</td><td>$99</td><td>Essentials</td></tr><tr><td>SFX Pack</td><td>$99</td><td>All (Bonus)</td></tr></table></div><div><div class="card-label" style="margin-bottom:12px;">Packs at $50+</div><table class="tbl" style="font-size:12px;"><tr><th>Pack</th><th>Price</th><th>Bundle</th></tr><tr><td>Promo Pack</td><td>$59</td><td>Online Creator</td></tr><tr><td>Cinematic Credit</td><td>$49</td><td>Cinematic</td></tr><tr><td>Message Pack</td><td>$59</td><td>Essentials</td></tr><tr><td>Tracker Call-Out</td><td>$59</td><td>Essentials</td></tr><tr><td>Camera Movements</td><td>$59</td><td>Essentials</td></tr></table><div class="callout" style="margin-top:16px;font-size:12px;">Every pack designed with its <strong>final bundle</strong> in mind. Value ladder pushes customers from packs → bundles.</div></div></div></div>`},
{title:'Content Flywheel',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>The Content Flywheel</h2><div class="tagline">One action, multiple outputs — the core strategy</div></div><div class="grid-2 flex-fill"><div><div style="display:flex;flex-direction:column;gap:12px;"><div style="display:flex;align-items:center;gap:12px;"><span class="step-num">1</span><div style="font-size:14px;"><strong>Develop a new pack</strong> — gives you material</div></div><div style="display:flex;align-items:center;gap:12px;"><span class="step-num">2</span><div style="font-size:14px;"><strong>Record tutorials</strong> — around techniques in that pack</div></div><div style="display:flex;align-items:center;gap:12px;"><span class="step-num">3</span><div style="font-size:14px;"><strong>Promote the product</strong> — naturally through content</div></div><div style="display:flex;align-items:center;gap:12px;"><span class="step-num">4</span><div style="font-size:14px;"><strong>Repurpose</strong> — shorts, newsletter, social</div></div><div style="display:flex;align-items:center;gap:12px;"><span class="step-num">5</span><div style="font-size:14px;"><strong>Convert</strong> — email list → customers → feedback</div></div></div><div class="callout" style="margin-top:20px;"><strong>Weekly recording morning — non-negotiable.</strong><br>No distractions. 4-5 hours deep work. Stay in rhythm.</div></div><div><div class="card-label" style="margin-bottom:12px;">Content Pipeline</div><table class="tbl" style="font-size:12px;"><tr><th>Format</th><th>Freq.</th><th>CTA</th></tr><tr><td>Evergreen tutorials</td><td>1x/wk</td><td>Free Starter Pack</td></tr><tr><td>Edit Like / Re-Create</td><td>2x/wk</td><td>Project file</td></tr><tr><td>Composition how-to</td><td>Mixed</td><td>File + Starter Pack</td></tr><tr><td>Design Principles</td><td>Monthly</td><td>Starter Pack + sell</td></tr><tr><td>Pack launch series</td><td>Per launch</td><td>Pack / bundle</td></tr></table><div class="card" style="margin-top:16px;text-align:center;background:linear-gradient(135deg,rgba(106,111,236,0.12),rgba(160,106,236,0.12));border:1px solid rgba(106,111,236,0.2);"><div class="card-label">YouTube Goal</div><div style="font-size:24px;font-weight:800;color:#fff;">100K subs · 150+ videos</div></div></div></div></div>`},
{title:'Pack Launch Content',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Product Launch Content — Per Pack</h2><div class="tagline">7-12 pieces per launch × 13 packs = 90+ videos</div></div><div class="grid-3 flex-fill" style="grid-template-rows:1fr 1fr;gap:14px;"><div class="card" style="display:flex;gap:12px;align-items:flex-start;"><span class="step-num" style="font-size:11px;">1</span><div><div style="font-weight:700;color:#fff;font-size:13px;margin-bottom:4px;">Beta Test Video</div><div style="font-size:12px;line-height:1.5;color:var(--text-dim);">Explain to testers, collect feedback & bugs</div></div></div><div class="card" style="display:flex;gap:12px;align-items:flex-start;"><span class="step-num" style="font-size:11px;">2</span><div><div style="font-weight:700;color:#fff;font-size:13px;margin-bottom:4px;">Trailer</div><div style="font-size:12px;line-height:1.5;color:var(--text-dim);">Examples, features, what the pack does</div></div></div><div class="card" style="display:flex;gap:12px;align-items:flex-start;"><span class="step-num" style="font-size:11px;">3</span><div><div style="font-weight:700;color:#fff;font-size:13px;margin-bottom:4px;">Preview</div><div style="font-size:12px;line-height:1.5;color:var(--text-dim);">Every single asset in one video</div></div></div><div class="card" style="display:flex;gap:12px;align-items:flex-start;"><span class="step-num" style="font-size:11px;">4</span><div><div style="font-weight:700;color:#fff;font-size:13px;margin-bottom:4px;">Sample</div><div style="font-size:12px;line-height:1.5;color:var(--text-dim);">Free sample + usage demo</div></div></div><div class="card" style="display:flex;gap:12px;align-items:flex-start;"><span class="step-num" style="font-size:11px;">5</span><div><div style="font-weight:700;color:#fff;font-size:13px;margin-bottom:4px;">Full Demo</div><div style="font-size:12px;line-height:1.5;color:var(--text-dim);">All categories walkthrough</div></div></div><div class="card" style="display:flex;gap:12px;align-items:flex-start;"><span class="step-num" style="font-size:11px;">6</span><div><div style="font-weight:700;color:#fff;font-size:13px;margin-bottom:4px;">Core Techniques</div><div style="font-size:12px;line-height:1.5;color:var(--text-dim);">Glass, expressions, animations…</div></div></div></div><div class="callout" style="margin-top:8px;"><strong>+ "How To" Micro-Series (1-5 videos)</strong> — Recreate samples from scratch. Target: <strong>prosumer editors</strong>, not beginners.</div></div>`},
{title:'Roadmap — Q1',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Stage 1: Maintenance — Q1</h2><div class="tagline">Get the engine running</div></div><div class="grid-3 flex-fill" style="gap:14px;"><div class="card"><div class="card-label">Team Management</div><div style="font-size:12px;line-height:1.6;">Simplified Notion hub. Public group chat. AI support encouraged.</div></div><div class="card"><div class="card-label">Team Building</div><div style="font-size:12px;line-height:1.6;"><strong>Bali — March 9-12.</strong> Train on systems, AI, communication. Align on the year.</div></div><div class="card"><div class="card-label">Beta Testing</div><div style="font-size:12px;line-height:1.6;">Launch with All-Access Pass users. First trial: <strong>The Journalist Pack</strong>.</div></div><div class="card"><div class="card-label">Product R&D</div><div style="font-size:12px;line-height:1.6;">Pipeline with art direction breakdowns. AI to speed workflows. Tuesday AM block.</div></div><div class="card"><div class="card-label">Content</div><div style="font-size:12px;line-height:1.6;">Strategy defined. Publication system built. <strong>Weekly batch recording.</strong></div></div><div class="card"><div class="card-label">Customer Support</div><div style="font-size:12px;line-height:1.6;">AI automation. Top 10 answers. Better tools (Spark). Personalised Loom.</div></div></div></div>`},
{title:'Roadmap — Q2',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Stage 2: Infrastructure — Q2</h2><div class="tagline">Convert at scale. Stay legally compliant.</div></div><div class="grid-2 flex-fill" style="gap:16px;"><div class="card" style="border-left:3px solid var(--danger);"><div class="card-label">Legal & Admin</div><div style="font-size:13px;line-height:1.6;">Register US LLC. VAT via Paddle. <strong>Biggest risk in the business.</strong></div></div><div class="card"><div class="card-label">Finances</div><div style="font-size:13px;line-height:1.6;">Accounting (QuickBooks/Doola). Clean books. Audit Shopify fees (~$10K/yr).</div></div><div class="card"><div class="card-label">Website Conversion</div><div style="font-size:13px;line-height:1.6;">Speed, conversion, UX. Work with Mehdi + Manus. <strong>Fix BEFORE paid traffic.</strong></div></div><div class="card"><div class="card-label">Email Marketing</div><div style="font-size:13px;line-height:1.6;">MailerLite → Klaviyo. New flows. Better segmentation = right message, right person.</div></div><div class="card" style="grid-column:1/3;"><div class="card-label">KPI Tracking</div><div style="font-size:13px;line-height:1.6;">Define key metrics. Centralise data. Quarterly reviews to improve. <strong>If you don't track it, you don't care.</strong></div></div></div></div>`},
{title:'Roadmap — Q3-Q4',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Stage 3: Scale — Q3-Q4</h2><div class="tagline">Everything set up. Pour fuel on the fire.</div></div><div class="grid-2 flex-fill" style="gap:16px;"><div class="card" style="background:linear-gradient(135deg,rgba(106,111,236,0.1),rgba(160,106,236,0.1));border:1px solid rgba(106,111,236,0.2);"><div class="card-label">Paid Advertising</div><div style="font-size:15px;line-height:1.65;">Ads across platforms. Work with Mehdi. When organic works → amplify with money.</div></div><div class="card"><div class="card-label">Influencer & Affiliate</div><div style="font-size:15px;line-height:1.65;">Relaunch affiliate for <strong>real creators</strong>. No coupon sites.</div></div><div class="card"><div class="card-label">SEO</div><div style="font-size:15px;line-height:1.65;">Basics + Google Ads. Work with Jan & Maru. Capture search traffic.</div></div><div class="card" style="background:linear-gradient(135deg,rgba(106,111,236,0.1),rgba(160,106,236,0.1));border:1px solid rgba(106,111,236,0.2);"><div class="card-label">Black Friday Strategy</div><div style="font-size:15px;line-height:1.65;"><strong>~60% of annual revenue.</strong> Clear conversion strategy planned well in advance.</div></div></div></div>`},
{title:'Free Starter Pack',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Free Starter Pack — Lead Magnet Engine</h2><div class="tagline">Our #1 lead gen tool needs a proper funnel</div></div><div class="grid-2 flex-fill" style="gap:20px;"><div><div class="card-label" style="margin-bottom:12px;">Welcome Sequence — 4 Videos</div><div style="display:flex;flex-direction:column;gap:10px;"><div class="card" style="padding:14px 16px;display:flex;gap:10px;align-items:flex-start;"><span class="step-num" style="font-size:10px;width:24px;height:24px;min-width:24px;">1</span><div><div style="font-weight:600;color:#fff;font-size:12px;">Get Started (10 min)</div><div style="font-size:11px;color:var(--text-dim);">Install, navigate, basics</div></div></div><div class="card" style="padding:14px 16px;display:flex;gap:10px;align-items:flex-start;"><span class="step-num" style="font-size:10px;width:24px;height:24px;min-width:24px;">2</span><div><div style="font-weight:600;color:#fff;font-size:12px;">Full Demo (30 min)</div><div style="font-size:11px;color:var(--text-dim);">All categories demonstrated</div></div></div><div class="card" style="padding:14px 16px;display:flex;gap:10px;align-items:flex-start;"><span class="step-num" style="font-size:10px;width:24px;height:24px;min-width:24px;">3</span><div><div style="font-weight:600;color:#fff;font-size:12px;">Case Study (30-45 min)</div><div style="font-size:11px;color:var(--text-dim);">Full video edit from scratch</div></div></div><div class="card" style="padding:14px 16px;display:flex;gap:10px;align-items:flex-start;"><span class="step-num" style="font-size:10px;width:24px;height:24px;min-width:24px;">4</span><div><div style="font-weight:600;color:#fff;font-size:12px;">Elevated Motion Graphics (15 min)</div><div style="font-size:11px;color:var(--text-dim);">Design basics → Bundle upsell CTA</div></div></div></div></div><div><div class="card-label" style="margin-bottom:12px;">Then</div><div class="callout" style="margin-bottom:14px;font-size:12px;"><strong>Creative Boost Week</strong> email sequence → push bundle sales after welcome videos build trust.</div><div class="card-label" style="margin-bottom:12px;margin-top:20px;">Touchpoint Videos</div><div style="font-size:13px;line-height:1.65;">One per category × 2 angles = <strong>30+ touchpoint videos</strong> blanketing YouTube with entry points.</div></div></div></div>`},
{title:'Roles & Responsibilities',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Roles & Responsibilities</h2><div class="tagline">Who owns what</div></div><div class="grid-2 flex-fill" style="gap:16px;"><div class="card"><div class="card-label">Vishal — Product Dev</div><div style="font-size:13px;line-height:1.65;"><strong>Owns:</strong> Product development, pack creation, technical quality.<br><strong>Goal:</strong> Ship 13+ packs. More ownership. AI to speed workflow.</div></div><div class="card"><div class="card-label">Sarah — Design</div><div style="font-size:13px;line-height:1.65;"><strong>Owns:</strong> Visual design, art direction, pre-build design.<br><strong>Goal:</strong> Minimal revision needed. Full autonomy. Better collab with Vishal & Reza.</div></div><div class="card"><div class="card-label">Reza — Content & Marketing</div><div style="font-size:13px;line-height:1.65;"><strong>Owns:</strong> Edit content and handle publication.<br><strong>Goal:</strong> Highest quality content for VES and Quick Resolve, always.</div></div><div class="card" style="background:linear-gradient(135deg,rgba(106,111,236,0.1),rgba(160,106,236,0.1));border:1px solid rgba(106,111,236,0.2);"><div class="card-label">Jeremy — CEO</div><div style="font-size:13px;line-height:1.65;"><strong>Owns:</strong> Strategy, content, customer acquisition, operations.<br><strong>Goal:</strong> Weekly recording. Ads. Email. Legal. Website. Operations.</div></div></div></div>`},
{title:'Communication',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Communication Protocol</h2><div class="tagline">How we work together</div></div><div class="grid-2 flex-fill" style="gap:16px;"><div class="card"><div class="card-label">Group Chat — Everything Public</div><div style="font-size:13px;line-height:1.65;">All work conversations here. Updates, questions, wins, challenges. Personal stuff fine via DM. Jeremy available afternoons for calls.</div></div><div class="card"><div class="card-label">Weekly Team Meeting — Monday</div><div style="font-size:13px;line-height:1.65;">One link (dashboard + chat). <strong>30-45 min.</strong> Team meetings, not individual. <strong>You tell me</strong> your plan, we re-adjust. 1-on-1 after if needed.</div></div><div class="card"><div class="card-label">AI Support & Research</div><div style="font-size:13px;line-height:1.65;">Stuck? <strong>1)</strong> Try AI. <strong>2)</strong> Ask group chat. <strong>3)</strong> We support as a team.</div></div><div class="card"><div class="card-label">Pro-Active Behaviour</div><div style="font-size:13px;line-height:1.65;">Shift: me telling you → <strong>you telling me</strong> what you plan to do. More ownership. More autonomy. More accountability.</div></div></div></div>`},
{title:'Notion System',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>New Notion System</h2><div class="tagline">Simplified. Lean. Actually useful.</div></div><div class="grid-4 flex-fill" style="grid-template-rows:1fr 1fr;gap:14px;"><div class="card" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:24px;margin-bottom:8px;">🎯</div><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">Quarter Targets</div><div style="font-size:11px;color:var(--text-dim);">What we're aiming for</div></div><div class="card" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:24px;margin-bottom:8px;">📋</div><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">Weekly Reports</div><div style="font-size:11px;color:var(--text-dim);">Daily work + off days</div></div><div class="card" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:24px;margin-bottom:8px;">🤝</div><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">Meeting Summaries</div><div style="font-size:11px;color:var(--text-dim);">All notes in one place</div></div><div class="card" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:24px;margin-bottom:8px;">🎬</div><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">Content Pipeline</div><div style="font-size:11px;color:var(--text-dim);">Manage production</div></div><div class="card" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:24px;margin-bottom:8px;">✅</div><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">General Tasks</div><div style="font-size:11px;color:var(--text-dim);">All tasks managed</div></div><div class="card" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:24px;margin-bottom:8px;">📦</div><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">Product Pipeline</div><div style="font-size:11px;color:var(--text-dim);">Cards with all info</div></div><div class="card" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:24px;margin-bottom:8px;">📚</div><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">Resources</div><div style="font-size:11px;color:var(--text-dim);">Tools & references</div></div><div class="card" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:24px;margin-bottom:8px;">💡</div><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">Inspiration Library</div><div style="font-size:11px;color:var(--text-dim);">Relevant content pinned</div></div></div></div>`},
{title:'Why This Matters',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Why This Matters</h2><div class="tagline">Beyond the numbers</div></div><div class="grid-2 flex-fill" style="gap:20px;"><div><div class="card-label" style="margin-bottom:16px;">If We Hit $1M</div><div class="bullet-item"><div class="bullet-dot"></div><div>Trajectory to <strong>$3M+ in 3 years</strong> — $30K bonuses + salary raise</div></div><div class="bullet-item"><div class="bullet-dot"></div><div><strong>Secures us</strong> in unstable times — war, crashes, AI disruption</div></div><div class="bullet-item"><div class="bullet-dot"></div><div><strong>Cashflow to pivot</strong> without stress when the time comes</div></div><div class="bullet-item"><div class="bullet-dot"></div><div>Proves <strong>5 years of consistency</strong> pays off exponentially</div></div></div><div><div class="card-label" style="margin-bottom:16px;">Watch Out For</div><div class="card" style="margin-bottom:12px;border-left:3px solid var(--danger);padding:14px 16px;"><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">AI in DaVinci Resolve</div><div style="font-size:12px;line-height:1.5;color:var(--text-dim);">Could disrupt in 2-3 years. Cash out now.</div></div><div class="card" style="margin-bottom:12px;border-left:3px solid var(--warning);padding:14px 16px;"><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">Market Instability</div><div style="font-size:12px;line-height:1.5;color:var(--text-dim);">War, economy. Stock up cash for rainy days.</div></div><div class="card" style="border-left:3px solid var(--accent-1);padding:14px 16px;"><div style="font-weight:600;color:#fff;font-size:13px;margin-bottom:4px;">Distraction</div><div style="font-size:12px;line-height:1.5;color:var(--text-dim);">Saying no to shiny opportunities is the hardest discipline.</div></div></div></div><div class="callout" style="margin-top:12px;"><strong>Bottom Line —</strong> $199K with minimal effort. Strategy is clear. Products proven. Audience trusts us. Only variable: <strong>execution and consistency</strong>.</div></div>`},
{title:'Questions & Discussion',html:`<div class="s-content" style="width:1280px;height:720px;"><div class="slide-header"><h2>Questions & Discussion</h2><div class="tagline">Let's talk about it</div></div><div class="grid-3 flex-fill" style="gap:20px;"><div class="card" style="display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center;padding:40px 24px;"><div style="font-size:48px;font-weight:800;margin-bottom:16px;" class="text-accent">?</div><div style="font-weight:700;color:#fff;font-size:16px;margin-bottom:10px;">Questions?</div><div style="font-size:13px;color:var(--text-dim);line-height:1.6;">Ask anything. No stupid questions. We're all figuring this out together.</div></div><div class="card" style="display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center;padding:40px 24px;"><div style="font-size:48px;font-weight:800;margin-bottom:16px;" class="text-accent">!</div><div style="font-weight:700;color:#fff;font-size:16px;margin-bottom:10px;">Concerns?</div><div style="font-size:13px;color:var(--text-dim);line-height:1.6;">Be honest. If something doesn't feel right, let's talk now.</div></div><div class="card" style="display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center;padding:40px 24px;"><div style="font-size:48px;font-weight:800;margin-bottom:16px;" class="text-accent">💡</div><div style="font-weight:700;color:#fff;font-size:16px;margin-bottom:10px;">Ideas?</div><div style="font-size:13px;color:var(--text-dim);line-height:1.6;">Share your thoughts. We need every perspective.</div></div></div></div>`},
{title:'Closing',html:`<div class="s-closing" style="width:1280px;height:720px;"><div class="bg-glow-1"></div><div class="bg-glow-2"></div><div style="position:relative;"><div style="font-size:14px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:32px;">Video Editor Studio</div><h1 style="font-size:56px;font-weight:800;line-height:1.15;letter-spacing:-0.02em;margin-bottom:24px;">Let's Build Something<br><span class="text-accent">Great — Together</span></h1><div style="font-size:17px;line-height:1.7;max-width:700px;margin:0 auto 40px;color:var(--text-dim);">$199K with minimal effort. Imagine full execution. The flywheel is ready. The products are proven. The audience is there.</div><div style="display:flex;gap:16px;justify-content:center;"><div style="background:linear-gradient(135deg,var(--accent-1),var(--accent-2));padding:16px 40px;border-radius:12px;font-size:28px;font-weight:800;color:#fff;box-shadow:0 8px 32px rgba(106,111,236,0.4);">$1M in 2026</div></div><div style="margin-top:32px;font-size:13px;color:var(--text-dim);letter-spacing:0.05em;">Lock in. Ship the work. Change our lives.</div></div></div>`}
];
let idx=0;
const vp=document.getElementById('viewport'),cur=document.getElementById('cur'),tot=document.getElementById('tot'),stl=document.getElementById('stitle'),pb=document.getElementById('prevBtn'),nb=document.getElementById('nextBtn');
function show(i){idx=i;vp.innerHTML='<div class="slide active">'+S[i].html+'</div>';cur.textContent=i+1;stl.textContent=S[i].title;pb.disabled=i===0;nb.disabled=i===S.length-1;}
function next(){if(idx<S.length-1)show(idx+1);}
function prev(){if(idx>0)show(idx-1);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
tot.textContent=S.length;show(0);
</script>
</body>
</html>
